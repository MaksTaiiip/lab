name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run linter
        run: flake8 main.py --max-line-length=120

      - name: Run unit tests
        run: pytest test_game.py -v

      - name: Build executable
        run: pyinstaller --onefile --windowed --name "BlockPuzzle" main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  deploy:
      needs: build-and-test
      runs-on: ubuntu-latest
      if: github.ref == 'refs/heads/main'
      permissions:
        contents: write
      steps:
        - name: Download artifact
          uses: actions/download-artifact@v4
          with:
            name: dist
            path: dist/

        - name: List dist files
          run: ls -la dist/

        - name: Create GitHub Release
          uses: softprops/action-gh-release@v2
          with:
            tag_name: v${{ github.run_number }}
            files: dist/*
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        - name: Install butler
          run: |
            curl -L -o butler.zip https://github.com/itchio/butler/releases/latest/download/butler-linux-amd64.zip
            unzip butler.zip
            sudo mv linux-amd64/butler /usr/local/bin/
            sudo chmod +x /usr/local/bin/butler
            butler --version

        - name: Deploy to itch.io
          run: |
            butler push dist/ makstaip/blockpuzzle:windows
          env:
            BUTLER_API_KEY: ${{ secrets.BUTLER_CREDENTIALS }}